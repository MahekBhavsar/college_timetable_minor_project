<div class="min-vh-100 d-flex align-items-center justify-content-center"
  style="background: linear-gradient(135deg, #0f2847 0%, #1a3a6c 50%, #1e4db7 100%);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">

        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

          <!-- Card Header Brand -->
          <div class="py-4 px-4 text-center text-white" style="background: linear-gradient(135deg,#1a3a6c,#2563eb);">
            <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
              style="width:56px;height:56px;background:rgba(255,255,255,0.18);">
              <i class="bi bi-shield-lock-fill fs-3 text-white"></i>
            </div>
            <h5 class="fw-bold mb-1">Admin Portal</h5>
            <p class="mb-0 text-white-50 small">University Management System</p>
          </div>

          <!-- Form Body -->
          <div class="card-body p-4 p-lg-5 bg-white">
            <h6 class="fw-bold text-dark mb-1">Welcome Back</h6>
            <p class="text-muted small mb-4">Sign in to your administrator account</p>

            @if (error()) {
            <div class="alert alert-danger rounded-3 small py-2 px-3 border-0 mb-3"
              style="background:#fee2e2;color:#b91c1c;">
              <i class="bi bi-exclamation-circle me-2"></i>{{ error() }}
            </div>
            }
            @if (success()) {
            <div class="alert alert-success rounded-3 small py-2 px-3 border-0 mb-3">
              <i class="bi bi-check-circle me-2"></i>{{ success() }}
            </div>
            }

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label small fw-semibold text-muted">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"
                  style="border-radius:10px 0 0 10px; border-color:#e2e8f0;">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input type="email" class="form-control border-start-0 ps-1" placeholder="admin@university.edu"
                  style="box-shadow:none; border-radius:0 10px 10px 0; border-color:#e2e8f0; background:#f8fafc;"
                  [(ngModel)]="email">
              </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label class="form-label small fw-semibold text-muted">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"
                  style="border-radius:10px 0 0 10px; border-color:#e2e8f0;">
                  <i class="bi bi-lock text-muted"></i>
                </span>
                <input type="password" class="form-control border-start-0 ps-1" placeholder="Enter your password"
                  style="box-shadow:none; border-radius:0 10px 10px 0; border-color:#e2e8f0; background:#f8fafc;"
                  [(ngModel)]="password">
              </div>
            </div>

            <!-- Remember Me -->
            <div class="d-flex align-items-center justify-content-between mb-4">
              <div class="form-check mb-0">
                <input type="checkbox" class="form-check-input" id="rememberMe" style="border-color:#cbd5e1;">
                <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
              </div>
              <a href="#" class="text-decoration-none small fw-semibold" style="color:#2563eb;">Forgot password?</a>
            </div>

            <!-- Submit -->
            <button class="btn w-100 fw-bold py-2 rounded-3 text-white mb-3"
              style="background: linear-gradient(135deg,#1a3a6c,#2563eb); border:none; box-shadow: 0 4px 14px rgba(37,99,235,0.35);"
              (click)="login()" [disabled]="loading()">
              @if (loading()) { <span class="spinner-border spinner-border-sm me-2"></span> }
              {{ loading() ? 'Signing in...' : 'Sign In' }}
            </button>

            <p class="text-center text-muted small mb-0">
              <i class="bi bi-shield-check me-1 text-success"></i>Secured with encrypted authentication
            </p>
          </div>
        </div>

        <p class="text-center text-white-50 small mt-3">
          © 2026 University Management System
        </p>
      </div>
    </div>
  </div>
</div>
